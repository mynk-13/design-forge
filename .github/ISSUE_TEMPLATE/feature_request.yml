name: Feature Request
description: Propose a new component, hook, or improvement to DesignForge
title: "feat: "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature. Before opening this request, please search [existing issues](https://github.com/mynk-13/design-forge/issues) and [discussions](https://github.com/mynk-13/design-forge/discussions) — the idea may already be tracked.

  - type: dropdown
    id: type
    attributes:
      label: Request Type
      description: What kind of change are you proposing?
      options:
        - "New component (packages/ui)"
        - "New hook (packages/hooks)"
        - "New icon (packages/icons)"
        - "Theme / token addition or change (packages/themes)"
        - "AI generator improvement (packages/ai)"
        - "Docs site improvement"
        - "Storybook improvement"
        - "Tooling / DX improvement"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Describe the use case clearly.
      placeholder: "When building X, I need Y because Z is not currently possible."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you have in mind. Include a rough API sketch if relevant.
      placeholder: |
        ```tsx
        // Proposed usage
        import { DateRangePicker } from "@designforge/ui";

        <DateRangePicker
          value={range}
          onChange={setRange}
          disabledDates={holidays}
        />
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered or tried? Why do you prefer the proposed solution?
    validations:
      required: false

  - type: dropdown
    id: breaking
    attributes:
      label: Would This Be a Breaking Change?
      options:
        - "No — purely additive"
        - "Yes — existing public API would change"
        - "Unsure"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links to prior art, design references, accessibility considerations, or anything else relevant.
    validations:
      required: false
